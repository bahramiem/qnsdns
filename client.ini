; ========================================
; dnstun CLIENT configuration
; Edit any value — TUI config panel (press '3') applies changes live
; ========================================

[core]
socks5_bind              = 127.0.0.1:1080
workers                  = 4
threads                  = 2
log_level                = info        ; silent | info | debug

[resolvers]
seed_list                = 8.8.8.8, 8.8.4.4, 1.1.1.1, 1.0.0.1, 9.9.9.9, 208.67.222.222
cidr_scan                = false       ; scan /24 subnet around each seed
cidr_prefix              = 24          ; 24 or 16
swarm_sync               = false       ; pull resolver list from server
background_recovery_rate = 5           ; dead-pool probes per second

[tuning]
poll_interval_ms         = 100         ; downstream POLL query interval
fec_window               = 32          ; chunks between FEC recalculation
cwnd_init                = 16          ; starting congestion window per resolver
cwnd_max                 = 512         ; maximum in-flight queries per resolver
idle_timeout_sec         = 120

[domains]
list                     = tun.example.com
dns_flux                 = false       ; time-sliced domain rotation
flux_period_sec          = 21600       ; 6 hours

[transport]
mode                     = udp         ; udp | doh | dot

[encryption]
enabled                  = false
cipher                   = chacha20    ; chacha20 | aes256gcm | noise_nk
psk                      = changeme    ; pre-shared key (must match server)
; pubkey_file            = server.pub  ; Noise_NK server public key

[obfuscation]
jitter                   = false       ; randomize query timing
padding                  = false       ; random-length garbage appended
chaffing                 = false       ; decoy queries when idle
chrome_cover             = false       ; mimic Chrome DNS fingerprint

[ota]
enabled                  = false       ; fetch config updates from server
check_interval_sec       = 3600
