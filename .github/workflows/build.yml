name: Build dnstun

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build pkg-config \
          libuv1-dev libzstd-dev libsodium-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cmake --build build --config Release --parallel
        mv build/dnstun-client build/dnstun-client-linux-amd64
        mv build/dnstun-server build/dnstun-server-linux-amd64

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dnstun-linux-amd64
        path: |
          build/dnstun-client-linux-amd64
          build/dnstun-server-linux-amd64

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies (vcpkg)
      run: |
        vcpkg install libuv libsodium zstd --triplet x64-windows-static

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

    - name: Build
      run: |
        cmake --build build --config Release --parallel
        ren build\Release\dnstun-client.exe dnstun-client-windows-amd64.exe
        ren build\Release\dnstun-server.exe dnstun-server-windows-amd64.exe

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dnstun-windows-amd64
        path: |
          build/Release/dnstun-client-windows-amd64.exe
          build/Release/dnstun-server-windows-amd64.exe

  release:
    name: Auto Release
    needs: [build-linux, build-windows]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Linux Artifacts
      uses: actions/download-artifact@v4
      with:
        name: dnstun-linux-amd64
        path: release-artifacts

    - name: Download Windows Artifacts
      uses: actions/download-artifact@v4
      with:
        name: dnstun-windows-amd64
        path: release-artifacts

    - name: Create GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: "latest"
        name: "Latest Build"
        body: "Automated deployment of the latest commit on the main branch for Linux and Windows AMD64."
        artifacts: "release-artifacts/*"
        allowUpdates: true
        replacesArtifacts: true
        draft: false
        makeLatest: true
