name: Build dnstun

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # libRaptorQ + Eigen is slow to compile; give it plenty of time
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build \
          libuv1-dev libzstd-dev libsodium-dev

    # Cache the build directory so recompiling Eigen/libRaptorQ is skipped
    # on subsequent pushes that only touch our own code.
    - name: Cache build directory
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'third_party/**') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build (parallel)
      # Use all available cores; GitHub runners have 2 on Linux and 2 on Windows
      run: |
        cmake --build build --config Release --parallel

    - name: Upload Artifacts (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: dnstun-linux
        path: |
          build/dnstun-client
          build/dnstun-server

    - name: Upload Artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: dnstun-windows
        path: |
          build/Release/dnstun-client.exe
          build/Release/dnstun-server.exe
