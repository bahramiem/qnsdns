name: Build dnstun

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # ── Linux ──────────────────────────────────────────────────────────────
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build pkg-config \
          libuv1-dev libzstd-dev libsodium-dev

    # ── Cache (speeds up Eigen/libRaptorQ recompile) ───────────────────────
    - name: Cache build directory
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'third_party/**') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    # ── Configure ──────────────────────────────────────────────────────────
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    # ── Build ──────────────────────────────────────────────────────────────
    - name: Build
      run: cmake --build build --config Release --parallel

    # ── Artifacts ──────────────────────────────────────────────────────────
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dnstun-linux
        path: |
          build/dnstun-client
          build/dnstun-server
