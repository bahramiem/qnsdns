name: Build dnstun

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # ── Linux ──────────────────────────────────────────────────────────────
    - name: Install Dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build \
          libuv1-dev libzstd-dev libsodium-dev

    # ── Windows ────────────────────────────────────────────────────────────
    - name: Install Dependencies (Windows via vcpkg)
      if: runner.os == 'Windows'
      run: |
        vcpkg install libuv libsodium zstd --triplet x64-windows-static
      env:
        VCPKG_DEFAULT_TRIPLET: x64-windows-static

    # ── Cache (speeds up Eigen/libRaptorQ recompile) ───────────────────────
    - name: Cache build directory
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'third_party/**') }}
        restore-keys: |
          ${{ runner.os }}-cmake-

    # ── Configure ──────────────────────────────────────────────────────────
    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

    # ── Build ──────────────────────────────────────────────────────────────
    - name: Build
      run: cmake --build build --config Release --parallel

    # ── Artifacts ──────────────────────────────────────────────────────────
    - name: Upload Artifacts (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: dnstun-linux
        path: |
          build/dnstun-client
          build/dnstun-server

    - name: Upload Artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: dnstun-windows
        path: |
          build/Release/dnstun-client.exe
          build/Release/dnstun-server.exe
